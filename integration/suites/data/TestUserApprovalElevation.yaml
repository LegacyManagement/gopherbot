name: TestUserApprovalElevation
metadata:
  subsystems:
    - authz
    - elevation
    - prompting
  tags:
    - user-approval
  runtimes:
    - go
  tier: focused
config_dir: test/userapproval
log_name: bottest.log
flow:
  - name: request-elevation
    send:
      user: alice
      channel: general
      text: ;go-sec-elevated
  - name: requester-chooses-approver
    receive:
      user: alice
      channel: general
      text_pattern: "Approval required for command gosec/secelevated\\. Select one approver: a\\) bob, b\\) carol"
  - name: select-carol
    send:
      user: alice
      channel: general
      text: b
  - name: carol-approval-prompt
    receive:
      user: carol
      text_pattern: "alice is requesting approval to run command gosec/secelevated - approve\\? \\(y/n\\)"
  - name: carol-approves
    send:
      user: carol
      text: "yes"
  - name: approval-granted
    receive:
      channel: general
      text_pattern: "Approval granted by carol"
  - name: protected-command-runs
    receive:
      channel: general
      text_pattern: "SECURITY CHECK: secelevated"
  - name: request-denied-elevation
    send:
      user: alice
      channel: general
      text: ;go-sec-elevated
  - name: requester-chooses-denying-approver
    receive:
      user: alice
      channel: general
      text_pattern: "Approval required for command gosec/secelevated\\. Select one approver: a\\) bob, b\\) carol"
  - name: select-bob
    send:
      user: alice
      channel: general
      text: a
  - name: bob-approval-prompt
    receive:
      user: bob
      text_pattern: "alice is requesting approval to run command gosec/secelevated - approve\\? \\(y/n\\)"
  - name: bob-denies
    send:
      user: bob
      text: "no"
  - name: approval-denied
    receive:
      channel: general
      text_pattern: "Approval denied by bob"
  - name: protected-command-blocked
    receive:
      channel: general
      text_pattern: "Sorry, this command requires elevation"
