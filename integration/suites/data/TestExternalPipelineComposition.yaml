name: TestExternalPipelineComposition
metadata:
  subsystems:
    - extension-api
    - pipeline
  tags:
    - add-task
    - caller-id
  runtimes:
    - python
    - ruby
  tier: focused
config_dir: test/membrain
log_name: bottest.log
cases:
  - input:
      user: alice
      channel: general
      text: ;python-pipeline
    replies:
      - channel: general
        text_pattern: 'PYTHON PIPELINE: queued'
      - channel: general
        text_pattern: 'PYTHON PIPELINE TASK: set parameter python'
      - channel: general
        text_pattern: 'PYTHON PIPELINE TASK: checked parameter python'
    replies_only: true
  - input:
      user: alice
      channel: general
      text: ;ruby-pipeline
    replies:
      - channel: general
        text_pattern: 'RUBY PIPELINE: queued'
      - channel: general
        text_pattern: 'RUBY PIPELINE TASK: set parameter ruby'
      - channel: general
        text_pattern: 'RUBY PIPELINE TASK: checked parameter ruby'
    replies_only: true
