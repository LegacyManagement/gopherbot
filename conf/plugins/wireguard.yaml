---
AllowedPrivateCommands:
- add-device
- admin-list-vpn-users
- admin-delete-vpn-user
- list-vpn-devices
- delete-device
- get-vpn
- get-vpn-info
- clear-vpn
RequiredPrivateCommands:
- add-device
- get-vpn
Commands:
- Regex: '(?i:add[- ]device ([.\w-]+) ([.\w\/+=-]+))'
  Command: add-device
  Usage: "add-device <device name> <public key>"
  Summary: "configure a new VPN connection for your device"
  Keywords: [ "wireguard", "vpn", "device" ]
- Regex: '(?i:allow[- ]ip ((?:\d{1,3}\.){3}\d{1,3}))'
  Command: allow-ip
  Usage: "allow-ip <ip address>"
  Summary: "open the host firewall for a public source IP"
  Keywords: [ "wireguard", "vpn", "firewall" ]
- Regex: '(?i:list[- ]vpn[- ]users)'
  Command: admin-list-vpn-users
  Usage: "list-vpn-users"
  Summary: "list all configured VPN users and devices"
  Keywords: [ "wireguard", "vpn", "users" ]
- Regex: '(?i:delete[- ]vpn[- ]user ([.\w-]+))'
  Command: admin-delete-vpn-user
  Usage: "delete-vpn-user <username>"
  Summary: "delete a VPN user and all their devices"
  Keywords: [ "wireguard", "vpn", "users" ]
- Regex: '(?i:list[- ]vpn[- ]devices)'
  Command: list-vpn-devices
  Usage: "list-vpn-devices"
  Summary: "list your configured VPN devices"
  Keywords: [ "wireguard", "vpn", "devices" ]
- Regex: '(?i:delete[- ]device ([.\w-]+))'
  Command: delete-device
  Usage: "delete-device <device>"
  Summary: "delete one of your VPN devices"
  Keywords: [ "wireguard", "vpn", "devices" ]
- Regex: '(?i:^get[- ]vpn[- ]info$)'
  Command: get-vpn-info
  Usage: "get-vpn-info"
  Summary: "show the robot WireGuard public endpoint and key"
  Keywords: [ "wireguard", "vpn", "public", "key", "endpoint" ]
- Regex: '(?i:^get[- ]vpn[- ]device ([.\w-]+)$)'
  Command: get-vpn
  Usage: "get-vpn-device <device>"
  Summary: "retrieve VPN endpoint, address, and PSK for a device"
  Keywords: [ "wireguard", "vpn", "config" ]
- Regex: '(?i:clear[- ]vpn)'
  Command: clear-vpn
  Usage: "clear-vpn"
  Summary: "remove all VPN users and devices and reset the host firewall"
  Keywords: [ "wireguard", "vpn", "clear" ]
AdminCommands:
- admin-list-vpn-users
- admin-delete-vpn-user
- clear-vpn
Config:
  ## Values corresponding to gcloud terraform module
  WireGuardConfigPath: "/etc/wireguard/wg0.conf"
  PostUp: "/etc/wireguard/start-nat.sh"
  PostDown: "/etc/wireguard/stop-nat.sh"
  # ManageHost: true|false - normally true for production
  # InterfaceAddress: "10.77.0.1/24"
  # ListenPort: 1234
  # PrivateKey: secret reference
  # PublicKey: variable reference